<header class="nav" [class.nav--scrolled]="scrolled()">
  <div class="nav__inner">

    <!-- Logo -->
    <a class="nav__logo" routerLink="/" (click)="closeMenu()" aria-label="Haven home">
      <span class="nav__logo-text">HAVEN</span>
    </a>

    <!-- Center links (desktop) -->
    <nav class="nav__links" aria-label="Primary navigation">
      <a routerLink="/gym"      routerLinkActive="nav__link--active" class="nav__link">The Gym</a>
      <a routerLink="/trainers" routerLinkActive="nav__link--active" class="nav__link">Trainers</a>
      <a routerLink="/classes"  routerLinkActive="nav__link--active" class="nav__link">Programs</a>
      <a href="mailto:hello@havenperformance.com"                    class="nav__link">Contact</a>
    </nav>

    <!-- Right CTAs (desktop) -->
    <div class="nav__actions">
      <a routerLink="/classes" class="nav__btn nav__btn--ghost">Inquire</a>
      <a routerLink="/classes" class="nav__btn nav__btn--gold">Membership</a>
    </div>

    <!-- Mobile toggle -->
    <button
      class="nav__toggle"
      [class.nav__toggle--open]="menuOpen()"
      (click)="toggleMenu()"
      aria-label="Toggle navigation menu"
      [attr.aria-expanded]="menuOpen()">
      <span></span>
      <span></span>
    </button>

  </div>

  <!-- Mobile drawer -->
  <div class="nav__drawer" [class.nav__drawer--open]="menuOpen()">
    <nav class="nav__drawer-links" aria-label="Mobile navigation">
      <a routerLink="/"         [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="nav__drawer-link--active" class="nav__drawer-link" (click)="closeMenu()">Home</a>
      <a routerLink="/gym"      routerLinkActive="nav__drawer-link--active" class="nav__drawer-link" (click)="closeMenu()">The Gym</a>
      <a routerLink="/trainers" routerLinkActive="nav__drawer-link--active" class="nav__drawer-link" (click)="closeMenu()">Trainers</a>
      <a routerLink="/classes"  routerLinkActive="nav__drawer-link--active" class="nav__drawer-link" (click)="closeMenu()">Programs</a>
    </nav>
    <div class="nav__drawer-actions">
      <a routerLink="/classes" class="nav__btn nav__btn--ghost" (click)="closeMenu()">Inquire</a>
      <a routerLink="/classes" class="nav__btn nav__btn--gold"  (click)="closeMenu()">Membership</a>
    </div>
  </div>
</header>
