<header class="nav" [class.nav--scrolled]="scrolled()">
  <div class="nav__inner">

    <!-- Logo -->
    <a class="nav__logo" routerLink="/" (click)="closeMenu()" aria-label="Haven home">
      <img src="assets/haven-fit-club-logo.png" alt="Haven Fit Club">
    </a>

    <!-- Center links (desktop) -->
    <nav class="nav__links" aria-label="Primary navigation">
      <a routerLink="/schedule"            routerLinkActive="nav__link--active" class="nav__link">Schedule</a>
      <a routerLink="/membership"          routerLinkActive="nav__link--active" class="nav__link">Membership</a>
      <a routerLink="/founding-membership" routerLinkActive="nav__link--active" class="nav__link">Founding Membership</a>
    </nav>

    <!-- Right CTAs (desktop) -->
    <div class="nav__actions">
      <a routerLink="/contact"    class="nav__btn nav__btn--ghost">Contact</a>
      <a routerLink="/membership" class="nav__btn nav__btn--gold">Join Now</a>
    </div>

    <!-- Mobile toggle -->
    <button
      class="nav__toggle"
      [class.nav__toggle--open]="menuOpen()"
      (click)="toggleMenu()"
      aria-label="Toggle navigation menu"
      [attr.aria-expanded]="menuOpen()">
      <span></span>
      <span></span>
    </button>

  </div>

  <!-- Mobile drawer -->
  <div class="nav__drawer" [class.nav__drawer--open]="menuOpen()">
    <nav class="nav__drawer-links" aria-label="Mobile navigation">
      <a routerLink="/"                    [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="nav__drawer-link--active" class="nav__drawer-link" (click)="closeMenu()">Home</a>
      <a routerLink="/schedule"            routerLinkActive="nav__drawer-link--active" class="nav__drawer-link" (click)="closeMenu()">Schedule</a>
      <a routerLink="/membership"          routerLinkActive="nav__drawer-link--active" class="nav__drawer-link" (click)="closeMenu()">Membership</a>
      <a routerLink="/founding-membership" routerLinkActive="nav__drawer-link--active" class="nav__drawer-link" (click)="closeMenu()">Founding Membership</a>
    </nav>
    <div class="nav__drawer-actions">
      <a routerLink="/contact"    class="nav__btn nav__btn--ghost" (click)="closeMenu()">Contact</a>
      <a routerLink="/membership" class="nav__btn nav__btn--gold"  (click)="closeMenu()">Join Now</a>
    </div>
  </div>
</header>
