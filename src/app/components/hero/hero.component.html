<section class="hero" aria-labelledby="hero-headline">

  <!-- Background video (decorative, hidden from assistive tech) -->
  <div class="hero__video-wrap" aria-hidden="true">
    <video
      #heroVideo
      class="hero__video"
      muted
      loop
      playsinline
      preload="auto"
      poster="assets/hero-poster.jpg"
      (loadeddata)="startVideo()"
    >
      <source src="assets/video.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Dark overlay for readability -->
  <div class="hero__overlay" aria-hidden="true"></div>

  <!-- Main content -->
  <div class="hero__content">
    <div class="container">

      <p class="hero__eyebrow">
        <span class="hero__eyebrow-rule" aria-hidden="true"></span>
        Paramus, NJ
      </p>

      <h1 class="hero__headline" id="hero-headline">
        <span class="hero__line">HAVEN</span>
        <span class="hero__line hero__line--accent">FIT CLUB</span>
      </h1>

      <p class="hero__tagline">Performance. Longevity. Community.</p>

      <p class="hero__subtext">
        Coach-led classes and small-group training designed to help you
        build strength, move better, and perform at your highest level.
      </p>

      <div class="hero__buttons">
        <a routerLink="/schedule" class="btn btn--gold">View Schedule</a>
        <a href="#training" class="btn btn--ghost">Learn More</a>
      </div>

    </div>
  </div>

</section>
